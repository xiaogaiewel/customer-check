<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感恩优享合约 · 目标客户查询</title>
    <style>
        :root {
            --primary: #4A6CF7;
            --success: #10B981;
            --danger: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-800: #1F2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #f9fafb 50%, #f0f4ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* 顶部 */
        .top-bar {
            background: linear-gradient(135deg, #4A6CF7 0%, #6C8CFF 100%);
            padding: 24px 24px 28px;
            text-align: center;
        }
        .top-bar .icon-circle {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
            backdrop-filter: blur(10px);
        }
        .top-bar h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .top-bar p {
            font-size: 13px;
            color: rgba(255,255,255,0.85);
            margin-top: 4px;
        }

        /* 主内容 */
        .main-content {
            padding: 20px 20px 16px;
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 10px;
            background: var(--gray-50);
            border-radius: 14px;
            padding: 6px;
            border: 2px solid var(--gray-200);
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(74,108,247,0.08);
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 14px;
            font-size: 16px;
            color: var(--gray-800);
            outline: none;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .search-box input::placeholder {
            color: var(--gray-400);
            font-weight: 400;
        }
        .search-box button {
            padding: 12px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .search-box button:hover {
            background: #3B5DE7;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74,108,247,0.3);
        }
        .search-box button:active {
            transform: translateY(0);
        }
        .hint-text {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 8px;
            text-align: center;
        }

        /* 结果卡片 */
        .result-card {
            border-radius: 16px;
            padding: 24px;
            margin-top: 12px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: none;
            position: relative;
            overflow: hidden;
        }
        .result-card.show {
            display: block;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 可办理 */
        .result-card.success {
            background: linear-gradient(135deg, #ECFDF5 0%, #F0FDF6 100%);
            border: 1px solid #A7F3D0;
        }
        .result-card.success::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: rgba(16, 185, 129, 0.06);
            border-radius: 50%;
        }

        /* 不可办理 */
        .result-card.danger {
            background: linear-gradient(135deg, #FEF2F2 0%, #FFF5F5 100%);
            border: 1px solid #FECACA;
        }
        .result-card.danger::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 120px;
            height: 120px;
            background: rgba(239, 68, 68, 0.06);
            border-radius: 50%;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .result-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .success .result-icon {
            background: #D1FAE5;
        }
        .danger .result-icon {
            background: #FEE2E2;
        }
        .result-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .success .result-title {
            color: #065F46;
        }
        .danger .result-title {
            color: #991B1B;
        }
        .result-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
        }
        .success .result-badge {
            background: #A7F3D0;
            color: #065F46;
        }
        .danger .result-badge {
            background: #FECACA;
            color: #991B1B;
        }

        .result-details {
            background: rgba(255,255,255,0.7);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            backdrop-filter: blur(4px);
        }
        .detail-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
        .detail-row:last-child {
            margin-bottom: 0;
        }
        .detail-label {
            color: var(--gray-500);
            width: 75px;
            flex-shrink: 0;
            font-weight: 500;
        }
        .detail-value {
            font-weight: 500;
            word-break: break-all;
        }
        .success .detail-value {
            color: #065F46;
        }
        .danger .detail-value {
            color: #991B1B;
        }

        .result-footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed rgba(0,0,0,0.1);
            font-size: 13px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .success .result-footer {
            color: #065F46;
        }
        .danger .result-footer {
            color: #991B1B;
        }

        /* 错误提示 */
        .error-toast {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #991B1B;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            animation: slideUp 0.3s ease;
        }
        .error-toast.show {
            display: flex;
        }

        /* 底部 */
        .footer-bar {
            text-align: center;
            padding: 12px 20px 20px;
            font-size: 11px;
            color: var(--gray-400);
            letter-spacing: 0.5px;
            border-top: 1px solid var(--gray-100);
            margin: 0 20px;
        }

        /* 密码弹窗 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(4px);
        }
        .password-dialog {
            background: #fff;
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            width: 300px;
            animation: slideUp 0.3s ease;
        }
        .password-dialog .lock-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .password-dialog h3 {
            font-size: 17px;
            color: var(--gray-800);
            margin-bottom: 6px;
        }
        .password-dialog p {
            font-size: 13px;
            color: var(--gray-500);
            margin-bottom: 16px;
        }
        .password-dialog input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .password-dialog input:focus {
            border-color: var(--primary);
        }
        .password-dialog button {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .password-dialog button:hover {
            background: #3B5DE7;
        }
        .password-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .password-error.show {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 0;
                min-height: 100vh;
                box-shadow: none;
            }
            .top-bar {
                border-radius: 0 0 20px 20px;
            }
            .main-content {
                padding: 16px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- 密码验证层 -->
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-dialog">
            <div class="lock-icon">🔐</div>
            <h3>请输入查询密码</h3>
            <p>请联系管理员获取访问密码</p>
            <input type="password" id="passwordInput" placeholder="请输入4位密码" maxlength="4" autofocus>
            <button onclick="verifyPassword()">验证进入</button>
            <p class="password-error" id="passwordError">密码错误，请重试</p>
        </div>
    </div>

    <!-- 主页面（密码正确后才显示） -->
    <div class="container" id="mainContainer" style="display:none;">
        <!-- 顶部 -->
        <div class="top-bar">
            <div class="icon-circle">📋</div>
            <h1>感恩优享合约</h1>
            <p>目标客户查询系统</p>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <!-- 搜索框 -->
            <div class="search-box">
                <input type="tel" id="phoneInput" placeholder="请输入客户手机号码" maxlength="11" autofocus>
                <button onclick="doSearch()">🔍 查询</button>
            </div>
            <p class="hint-text">输入11位手机号，判断是否为可营销目标客户</p>

            <!-- 错误提示 -->
            <div class="error-toast" id="errorToast">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>

            <!-- 结果卡片 -->
            <div id="resultContainer"></div>
        </div>

        <!-- 底部 -->
        <div class="footer-bar">
            🔒 数据仅供内部营销参考 · 严禁外泄
        </div>
    </div>

    <script>
        // =================================================
        // 查询密码设置（修改这里可以改密码）
        // =================================================
        const QUERY_PASSWORD = "2026";

        // =================================================
        // 限制名单数据库
        // 格式：{ phone: "手机号", type: "限制类型", reason: "不可办理原因", date: "入库时间" }
        // 新增数据按同样格式在下面添加即可
        // =================================================
        const blacklistData = [
            { phone: "18745290899", type: "已办理感恩优享合约", reason: "用户已办理感恩优享合约，无需重复营销此业务", date: "2026/7/4" },
            { phone: "15245240117", type: "已办理承诺消费活动", reason: "用户已办理承诺消费尊享活动，无需重复营销此业务", date: "2026/7/4" },
            { phone: "13846287339", type: "已退订承诺尊享", reason: "用户已退订承诺消费尊享活动，不要再次营销该活动", date: "2026/7/4" },
            { phone: "19845668889", type: "禁止外呼营销号码库", reason: "禁止外呼，不得打扰客户", date: "2026/7/4" },
            // ⬇️ 在此行下方继续添加新数据，格式同上 ⬇️
        ];

        // 转换成对象方便快速查找
        const blacklistMap = {};
        blacklistData.forEach(item => {
            blacklistMap[item.phone] = {
                type: item.type,
                reason: item.reason,
                date: item.date
            };
        });

        // =================================================
        // 密码验证
        // =================================================
        function verifyPassword() {
            const input = document.getElementById('passwordInput').value.trim();
            const errorEl = document.getElementById('passwordError');
            
            if (input === QUERY_PASSWORD) {
                document.getElementById('passwordOverlay').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                document.getElementById('phoneInput').focus();
            } else {
                errorEl.classList.add('show');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        document.getElementById('passwordInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                verifyPassword();
            }
        });

        // =================================================
        // 查询逻辑
        // =================================================
        function doSearch() {
            const phone = document.getElementById('phoneInput').value.trim();
            const errorToast = document.getElementById('errorToast');
            const errorText = document.getElementById('errorText');
            const resultContainer = document.getElementById('resultContainer');

            // 隐藏之前的错误和结果
            errorToast.classList.remove('show');
            resultContainer.innerHTML = '';

            // 校验手机号
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                errorText.textContent = '请输入正确的11位手机号码';
                errorToast.classList.add('show');
                return;
            }

            // 查询
            const record = blacklistMap[phone];

            if (record) {
                // 命中限制名单 —— 不可办理
                resultContainer.innerHTML = `
                    <div class="result-card danger show">
                        <div class="result-header">
                            <div class="result-icon">🚫</div>
                            <div>
                                <div class="result-title">不可办理</div>
                                <div class="result-badge">${record.type}</div>
                            </div>
                        </div>
                        <div class="result-details">
                            <div class="detail-row">
                                <span class="detail-label">手机号码</span>
                                <span class="detail-value">${phone}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">限制原因</span>
                                <span class="detail-value">${record.reason}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">入库时间</span>
                                <span class="detail-value">${record.date}</span>
                            </div>
                        </div>
                        <div class="result-footer">⚠️ 请勿拨打该号码，避免客户投诉</div>
                    </div>`;
            } else {
                // 未命中 —— 可办理
                resultContainer.innerHTML = `
                    <div class="result-card success show">
                        <div class="result-header">
                            <div class="result-icon">✅</div>
                            <div>
                                <div class="result-title">可办理</div>
                                <div class="result-badge">目标客户</div>
                            </div>
                        </div>
                        <div class="result-details">
                            <div class="detail-row">
                                <span class="detail-label">手机号码</span>
                                <span class="detail-value">${phone}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">查询结果</span>
                                <span class="detail-value">该号码不在任何限制名单内，为感恩优享合约目标客户，可进行营销外呼</span>
                            </div>
                        </div>
                        <div class="result-footer">💡 请按标准话术进行电话营销</div>
                    </div>`;
            }
        }

        // 回车键查询
        document.getElementById('phoneInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                doSearch();
            }
        });
    </script>
</body>
</html>
